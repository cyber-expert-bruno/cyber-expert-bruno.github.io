<!DOCTYPE html>  
<html lang="en">  
<head>

  <style>  
    * {  
      margin: 0;  
      padding: 0;  
      box-sizing: border-box;  
    }    
    :root {  
      --cyan: #00f0ff;  
      --purple: #7000ff;  
      --pink: #ff007b;  
      --bg-dark: #030712;  
      --card-bg: rgba(15, 23, 42, 0.7);  
      --card-border: rgba(255, 255, 255, 0.08);  
      --gradient-text: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));  
      --gradient-btn: linear-gradient(90deg, #00f0ff, #7000ff, #ff007b);  
      --text: #f8fafc;  
      --text-muted: #94a3b8;  
    }  

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--bg-dark);
      position: relative;
    }

    /* INTERACTIVE CANVAS ANIMATION */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: auto;
    }

    .container {
      width: min(900px, 92%);
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding: 20px 0 50px;
    }

    /* PROFILE & HERO SECTION */
    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .profile-wrap {
      position: relative;
      padding: 4px;
      border-radius: 50%;
      background: var(--gradient-text);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
      animation: pulseGlow 4s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); }
      100% { box-shadow: 0 0 40px rgba(255, 0, 123, 0.4); }
    }

    .round-profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #030712;
    }

    .round-profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-box {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .hero-box.small-box {
      width: min(400px, 100%);
      padding: 10px 20px;
    }

    .hero-title {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: clamp(1.1rem, 3.5vw, 2.1rem);
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .hero-subtitle {
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* PANELS & CARDS */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 24px;
      margin-top: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .panel-title {
      font-family: "Orbitron", sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
    }

    .panel-title i {
      color: var(--cyan);
      font-size: 1.1rem;
    }

    /* SOCIAL BUTTONS */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-btn);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }

    .social-btn > * {
      position: relative;
      z-index: 1;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      border-color: transparent;
      box-shadow: 0 10px 20px rgba(0, 240, 255, 0.2);
    }

    .social-btn:hover::before {
      opacity: 0.15;
    }

    .social-btn i {
      font-size: 20px;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* FORM STYLES */
    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13.5px;
      font-weight: 700;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      outline: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: rgba(3, 7, 18, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-size: 14.5px;
      font-family: "Fira Code", monospace;
      transition: all 0.3s ease;
    }

    input::placeholder, textarea::placeholder {
      color: #475569;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
      background: rgba(3, 7, 18, 0.9);
    }

    select option {
      background: #030712;
      color: #ffffff;
    }

    textarea {
      min-height: 150px;
      resize: vertical;

    .submit-btn {
      border: none;
      outline: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #ffffff;
      background: var(--gradient-btn);
      background-size: 200% auto;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(112, 0, 255, 0.3);
    }

    .submit-btn:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 0, 123, 0.4);
    }

    /* RESPONSIVE DESIGN */

      }

      .panel {
        padding: 18px;
      }

      .round-profile {
        width: 100px;
        height: 100px;
      }
    }
  </style>

  <!-- JAVASCRIPT ANIMATIONS & LOGIC -->
  <script>  
    /* --- 1. INTERACTIVE PARTICLE CONSTELLATION CANVAS --- */
    const canvas = document.getElementById("bgCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas() {  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const particles = [];
    const particleCount = 65;
    const colors = ["#00f0ff", "#7000ff", "#ff007b"];

    let mouse = { x: null, y: null, radius: 150 };

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = null;
      mouse.y = null;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = (Math.random() - 0.5) * 1.2;
        this.size = Math.random() * 2 + 1;
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        // Interactive mouse connection
        if (mouse.x && mouse.y) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < mouse.radius) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        for (let j = i + 1; j < particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 110) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(112, 0, 255, ${1 - dist / 110})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();

    /* --- 2. WHATSAPP FORM SUBMISSION --- */
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e) {  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if (!service || !problem) {  
        alert("Please select a service and describe your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem Description:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>
