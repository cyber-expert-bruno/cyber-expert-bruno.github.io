<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Cyber Security Expert - Bruno</title>  
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  
  <style>  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }    
    :root{  
      /* LUXURY DEEP CYBER PALETTE */
      --bg1: #030712;  
      --bg2: #0b1329;  
      --bg3: #111c38;  
      --card: rgba(13, 22, 45, 0.75);  
      --line: rgba(0, 240, 255, 0.25);  
      --line-2: rgba(255, 255, 255, 0.08);  
      --text: #f0f6ff;  
      --muted: #94a3b8;  
      --neon: #00f0ff;  
      --neon2: #0088ff;  
      --pink: #ff0055;  
      --purple: #7000ff;  
      --shadow: 0 0 35px rgba(0, 240, 255, 0.15);  
    }  

    html{ scroll-behavior:smooth; }

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 240, 255, 0.12), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(112, 0, 255, 0.15), transparent 30%),
        radial-gradient(circle at 75% 80%, rgba(255, 0, 85, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      position:relative;
    }

    .grid-bg{
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
      background-size:40px 40px;
      animation:gridMove 12s linear infinite;
      pointer-events:none;
      z-index:0;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0.2));
    }

    @keyframes gridMove{
      from{transform:translateY(0);}
      to{transform:translateY(40px);}
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:0.03;
      background-image:
        radial-gradient(circle at 25% 25%, #fff 0.6px, transparent 0.7px),
        radial-gradient(circle at 75% 45%, #fff 0.6px, transparent 0.7px);
      background-size: 100px 100px;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(60px);
      pointer-events:none;
      z-index:0;
      opacity:0.25;
      animation:floatOrb 8s ease-in-out infinite alternate;
    }

    .orb1{
      width:300px;
      height:300px;
      background:var(--neon);
      top:-50px;
      left:-50px;
    }

    .orb2{
      width:320px;
      height:320px;
      background:var(--purple);
      right:-80px;
      bottom:-50px;
      animation-duration:10s;
    }

    .orb3{
      width:220px;
      height:220px;
      background:var(--pink);
      top:45%;
      left:50%;
      transform:translateX(-50%);
      animation-duration:12s;
      opacity:0.15;
    }

    @keyframes floatOrb{
      from{transform:translateY(0) scale(1);}
      to{transform:translateY(30px) scale(1.1);}
    }

    #matrixCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      opacity:0.15;
      pointer-events:none;
    }

    .scanlines{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:0.06;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.08) 0px,
          rgba(255,255,255,0.08) 1px,
          transparent 2px,
          transparent 4px
        );
      animation:scanMove 5s linear infinite;
    }

    @keyframes scanMove{
      from{transform:translateY(0);}
      to{transform:translateY(20px);}
    }

    .container{
      width:min(1040px, 92%);
      margin:0 auto;
      position:relative;
      z-index:2;
      padding:10px 0 42px;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 5px;
    }

    .profile-pic-center {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 5px;
    }

    .round-profile{
      width:130px;
      height:130px;
      padding:3px;
      border-radius:50%;
      overflow:hidden;
      background: linear-gradient(135deg, var(--neon), var(--purple), var(--pink));  
      background-size:200% 200%;  
      animation:gradientFlow 4s ease infinite;
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
    }

    .round-profile img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(13, 22, 45, 0.85);
      backdrop-filter: blur(16px);
      box-shadow:
        0 15px 45px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        var(--shadow);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
    }

    .hero-box.bruno-small-box {
      width: 60%;
      margin: 0 auto;
      padding: 10px 30px;
      border-radius: 14px;
      margin-top: -2px;
    }

    .hero-box::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(90deg,
        rgba(0, 240, 255, 0.2),
        rgba(112, 0, 255, 0.2),
        rgba(255, 0, 85, 0.2)
      );
      filter: blur(15px);
      z-index: 0;
      opacity: 0.8;
    }

    .hero-box > * { position: relative; z-index: 1; }

    .hero-title{
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1.4px;
      font-size:clamp(1.2rem, 3.2vw, 2.4rem);
      line-height:1.2;
      white-space:nowrap;
      background: linear-gradient(90deg, #ffffff, var(--neon), #ffffff);
      background-size:200% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:gradientFlow 4s ease infinite;
      filter:drop-shadow(0 0 12px rgba(0, 240, 255, 0.4));
    }

    .hero-subtitle{
      font-family:"Orbitron", sans-serif;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing: 1.2px;
      font-size:clamp(0.85rem, 2.2vw, 1.2rem);
      line-height:1.2;
      white-space:nowrap;
      display: block;
      text-align: center;
      background: linear-gradient(90deg, var(--neon), #ffffff, var(--pink));
      background-size:200% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:gradientFlow 5s ease infinite;
      filter:drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
    }

    @keyframes gradientFlow{
      0%{ background-position:0% 50%; }
      50%{ background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }

    .panel{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:24px;
      padding:22px;
      box-shadow:
        0 18px 55px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        var(--shadow);
      backdrop-filter:blur(16px);
      margin-top:20px;
    }

    .panel-title{
      font-family:"Orbitron", sans-serif;
      font-size:1rem;
      font-weight:800;
      letter-spacing:1px;
      margin-bottom:16px;
      display:flex;
      align-items:center;
      gap:12px;
      color:#ffffff;
      text-transform:uppercase;
      flex-wrap:wrap;
    }

    .problem-heading{
      text-transform:none !important;
      font-size:1rem;
      white-space:nowrap;
    }

    .panel-title i{
      color:var(--neon);
      font-size:1rem;
      filter:drop-shadow(0 0 10px var(--neon));
    }

    .social-grid{
      display:flex;
      gap:15px;
      justify-content:space-between;
    }

    .social-btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:18px;
      border-radius:18px;
      background: rgba(255, 255, 255, 0.03);
      border:1px solid rgba(255, 255, 255, 0.08);
      color:#fff;
      text-decoration:none;
      transition: all 0.3s ease;
      box-shadow:0 6px 20px rgba(0,0,0,0.3);
    }

    .social-btn:hover{
      transform:translateY(-3px);
      background: rgba(0, 240, 255, 0.08);
      border-color:var(--neon);
      box-shadow:0 0 25px rgba(0, 240, 255, 0.25);
    }

    .social-btn i{
      font-size:22px;
      color:var(--neon);
      width:22px;
      text-align:center;
      transition: 0.3s;
    }

    .social-btn:hover i{
      transform: scale(1.15);
    }

    .social-btn span{
      font-size:15px;
      font-weight:700;
      color:#fff;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:4px;
    }

    .full{ grid-column:1 / -1; }

    .input-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:13.5px;
      color:#e2e8f0;
      font-weight:700;
      letter-spacing:.25px;
    }

    input, select, textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:14px;
      padding:15px 16px;
      background: rgba(0, 0, 0, 0.4);
      border:1px solid rgba(255, 255, 255, 0.1);
      color:var(--text);
      font-size:15px;
      transition:0.25s ease;
    }

    input::placeholder, textarea::placeholder{
      color:#64748b;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--neon);
      box-shadow:0 0 15px rgba(0, 240, 255, 0.2);
      background: rgba(0, 0, 0, 0.6);
    }

    select option{
      background:#0b1329;
      color:#ffffff;
    }

    textarea{
      min-height:185px;
      resize:vertical;
      line-height:1.65;
    }

    .submit-btn{
      position:relative;
      overflow:hidden;
      border:none;
      outline:none;
      padding:16px 20px;
      border-radius:16px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#000000;
      background: linear-gradient(90deg, var(--neon), #00aaff, var(--neon));
      background-size:200% 100%;
      transition:0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
    }

    .submit-btn:hover{
      transform:translateY(-2px);
      box-shadow: 0 15px 40px rgba(0, 240, 255, 0.5);
      background-position: 100% 0;
    }

    .submit-btn i{ margin-right:8px; font-size:18px; }

    @media (max-width: 820px){
      form{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){
      .hero-box {
        padding: 16px 14px;
        border-radius: 16px;
      }

      .round-profile {
        width: 100px;
        height: 100px;
      }

      .hero-box.bruno-small-box {
        width: 90%;
        padding: 8px 20px;
      }

      .panel{
        padding:18px;
        border-radius:20px;
      }

      .social-grid{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .social-btn{
        min-height:62px;
        padding:14px 10px;
      }

      .social-btn span{
        font-size:14px;
      }

      .hero-title{
        font-size:clamp(1.1rem, 5.2vw, 1.6rem);
      }

      .hero-subtitle{
        font-size:clamp(.8rem, 3.8vw, 1.05rem);
      }

      .problem-heading{
        font-size:.88rem;
      }
    }

    @media (max-width: 420px){
      .round-profile {
        width: 90px;
        height: 90px;
      }

      .hero-title{
        font-size:0.95rem;
        letter-spacing:1px;
      }

      .hero-subtitle{
        font-size:.78rem;
        letter-spacing:1px;
      }

      .problem-heading{
        font-size:.8rem;
      }
    }

  </style>  
</head>  
<body>

  <script>  
    const canvas = document.getElementById("matrixCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas(){  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>/{}[]";  
    const fontSize = 16;  
    let columns = Math.floor(window.innerWidth / fontSize);  
    let drops = Array(columns).fill(1);  
      
    function resetMatrix(){  
      columns = Math.floor(window.innerWidth / fontSize);  
      drops = Array(columns).fill(1);  
    }  
    window.addEventListener("resize", resetMatrix);  
      
    function drawMatrix(){  
      ctx.fillStyle = "rgba(3, 7, 18, 0.08)";  
      ctx.fillRect(0, 0, canvas.width, canvas.height);  
      
      for(let i = 0; i < drops.length; i++){  
        const char = chars.charAt(Math.floor(Math.random() * chars.length));  
        const x = i * fontSize;  
        const y = drops[i] * fontSize;  
      
        ctx.fillStyle = "#00f0ff";  
        ctx.font = fontSize + "px monospace";  
        ctx.fillText(char, x, y);  
      
        if(y > canvas.height && Math.random() > 0.975){  
          drops[i] = 0;  
        }  
        drops[i]++;  
      }  
    }  
      
    setInterval(drawMatrix, 30);  
      
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e){  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if(!service || !problem){  
        alert("Please select a service and write your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>
