<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Cyber Security Expert - Bruno</title>  
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  
  <style>  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }    

    :root{  
      --bg1:#030008;  
      --bg2:#0a021a;  
      --bg3:#12052e;  
      --card:rgba(15, 5, 30, 0.75);  
      --line:rgba(0, 243, 255, 0.3);  
      --line-pink:rgba(255, 0, 85, 0.4);  
      --text:#f8f5ff;  
      --muted:#c2b1e6;  
      --cyan:#00f3ff;  
      --red:#ff0055;  
      --purple:#a100ff;  
      --shadow:0 0 45px rgba(0, 243, 255, 0.25);  
    }  

    html{ scroll-behavior:smooth; }

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 243, 255, 0.15), transparent 35%),
        radial-gradient(circle at 85% 20%, rgba(255, 0, 85, 0.18), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(161, 0, 255, 0.2), transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      position:relative;
    }

    .grid-bg{
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(161, 0, 255, 0.08) 1px, transparent 1px);
      background-size:40px 40px;
      animation:gridMove 12s linear infinite;
      pointer-events:none;
      z-index:0;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0.2));
    }

    @keyframes gridMove{
      0%{transform:translateY(0) translateX(0);}
      100%{transform:translateY(40px) translateX(20px);}
    }

    /* Vibrant Glow Orbs */
    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(65px);
      pointer-events:none;
      z-index:0;
      opacity:0.35;
      animation:floatOrb 8s ease-in-out infinite alternate;
    }

    .orb1{
      width:320px;
      height:320px;
      background:var(--cyan);
      top:-50px;
      left:-80px;
    }

    .orb2{
      width:350px;
      height:350px;
      background:var(--red);
      right:-100px;
      bottom:10%;
      animation-duration:10s;
    }

    .orb3{
      width:280px;
      height:280px;
      background:var(--purple);
      top:40%;
      left:30%;
      animation-duration:12s;
      opacity:0.25;
    }

    @keyframes floatOrb{
      0%{transform:translate(0, 0) scale(1);}
      100%{transform:translate(35px, 45px) scale(1.15);}
    }

    #matrixCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      opacity:0.18;
      pointer-events:none;
    }

    .container{
      width:min(1040px, 92%);
      margin:0 auto;
      position:relative;
      z-index:2;
      padding:20px 0 50px;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 5px;
    }

    .profile-pic-center {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 5px;
    }

    .round-profile{
      width:135px;
      height:135px;
      padding:4px;
      border-radius:50%;
      overflow:hidden;
      position:relative;
      background:linear-gradient(45deg, var(--cyan), var(--red), var(--purple), var(--cyan));
      background-size:300% 300%;
      animation:gradientRotate 4s ease infinite;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.4), 0 0 15px rgba(255, 0, 85, 0.3);
    }

    .round-profile img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(10, 3, 25, 0.82);
      backdrop-filter: blur(20px);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.6),
        0 0 25px rgba(0, 243, 255, 0.15) inset;
      padding: 22px 26px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
      transition: 0.4s ease;
    }

    .hero-box.bruno-small-box {
      width: 65%;
      margin: 0 auto;
      padding: 12px 30px;
      border-radius: 16px;
      border-color: var(--line-pink);
      box-shadow:
        0 15px 35px rgba(0,0,0,0.5),
        0 0 20px rgba(255, 0, 85, 0.15) inset;
    }

    .hero-title{
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:clamp(1.3rem, 3.5vw, 2.5rem);
      line-height:1.2;
      white-space:nowrap;
      background:linear-gradient(90deg, #ffffff, var(--cyan), var(--red), var(--purple), #ffffff);
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:shineText 4s linear infinite;
      filter:drop-shadow(0 0 12px rgba(0, 243, 255, 0.35));
    }

    .hero-subtitle{
      font-family:"Orbitron", sans-serif;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing: 1.5px;
      font-size:clamp(0.9rem, 2.3vw, 1.25rem);
      line-height:1.2;
      white-space:nowrap;
      background:linear-gradient(90deg, #ffffff, var(--red), var(--cyan), #ffffff);
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:shineText 5s linear infinite;
      filter:drop-shadow(0 0 10px rgba(255, 0, 85, 0.4));
    }

    @keyframes gradientRotate{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes shineText{
      to{ background-position:200% center; }
    }

    .panel{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(161, 0, 255, 0.3);
      background:var(--card);
      border-radius:24px;
      padding:26px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.6),
        0 0 30px rgba(161, 0, 255, 0.1) inset;
      backdrop-filter:blur(20px);
      margin-top:24px;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .panel:hover{
      border-color: rgba(0, 243, 255, 0.4);
    }

    .panel-title{
      font-family:"Orbitron", sans-serif;
      font-size:1.05rem;
      font-weight:800;
      letter-spacing:1px;
      margin-bottom:20px;
      display:flex;
      align-items:center;
      gap:12px;
      color:#ffffff;
      text-transform:uppercase;
    }

    .panel-title i{
      color:var(--cyan);
      font-size:1.2rem;
      filter:drop-shadow(0 0 10px var(--cyan));
    }

    .social-grid{
      display:flex;
      gap:16px;
      justify-content:space-between;
    }

    .social-btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:18px;
      border-radius:18px;
      background:rgba(20, 8, 40, 0.7);
      border:1px solid rgba(255, 255, 255, 0.08);
      color:#fff;
      text-decoration:none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
      position:relative;
      overflow:hidden;
    }

    .social-btn::before{
      content:'';
      position:absolute;
      top:0; left:-100%;
      width:100%; height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: 0.5s;
    }

    .social-btn:hover::before{
      left:100%;
    }

    .social-btn:hover{
      transform:translateY(-5px) scale(1.02);
      background:rgba(30, 10, 60, 0.9);
      border-color:var(--cyan);
      box-shadow:0 0 25px rgba(0, 243, 255, 0.3);
    }

    .social-btn i{
      font-size:22px;
      color:var(--cyan);
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .social-btn:hover i{
      color:var(--red);
      transform:scale(1.2);
      filter:drop-shadow(0 0 10px var(--red));
    }

    .social-btn span{
      font-size:15px;
      font-weight:700;
      color:#fff;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:5px;
    }

    .full{ grid-column:1 / -1; }

    .input-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.3px;
    }

    input, select, textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:16px 18px;
      background:rgba(255, 255, 255, 0.035);
      border:1px solid rgba(161, 0, 255, 0.25);
      color:var(--text);
      font-size:15px;
      transition:0.3s ease;
    }

    input::placeholder, textarea::placeholder{
      color:#8d79b3;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--cyan);
      box-shadow:0 0 20px rgba(0, 243, 255, 0.25);
      background:rgba(255, 255, 255, 0.06);
    }

    select option{
      background:#0e0422;
      color:#f5eeff;
    }

    textarea{
      min-height:185px;
      resize:vertical;
      line-height:1.65;
    }

    .submit-btn{
      position:relative;
      border:none;
      outline:none;
      padding:18px 24px;
      border-radius:18px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#ffffff;
      background:linear-gradient(90deg, var(--cyan), var(--purple), var(--red), var(--cyan));
      background-size:300% 100%;
      animation:gradientRotate 6s linear infinite;
      transition:0.3s ease;
      box-shadow:
        0 10px 30px rgba(0, 243, 255, 0.3),
        0 0 20px rgba(255, 0, 85, 0.2);
    }

    .submit-btn:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:
        0 15px 40px rgba(0, 243, 255, 0.45),
        0 0 30px rgba(255, 0, 85, 0.35);
    }

    .submit-btn i{ margin-right:8px; font-size: 18px; }

    @media (max-width: 820px){
      form{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){
      .hero-box {
        padding: 18px 16px;
      }

      .round-profile {
        width: 110px;
        height: 110px;
      }

      .hero-box.bruno-small-box {
        width: 90%;
        padding: 10px 20px;
      }

      .panel{
        padding:20px;
      }

      .social-grid{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .social-btn{
        padding:15px 12px;
      }
    }
  </style>  
</head>  
<body>

  <script>  
    // Smooth Canvas Matrix Rain
    const canvas = document.getElementById("matrixCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas(){  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>/{}[]";  
    const fontSize = 15;  
    let columns = Math.floor(window.innerWidth / fontSize);  
    let drops = Array(columns).fill(1);  
      
    function resetMatrix(){  
      columns = Math.floor(window.innerWidth / fontSize);  
      drops = Array(columns).fill(1);  
    }  
    window.addEventListener("resize", resetMatrix);  
      
    function drawMatrix(){  
      ctx.fillStyle = "rgba(3, 0, 8, 0.08)";  
      ctx.fillRect(0, 0, canvas.width, canvas.height);  
      
      for(let i = 0; i < drops.length; i++){  
        const char = chars.charAt(Math.floor(Math.random() * chars.length));  
        const x = i * fontSize;  
        const y = drops[i] * fontSize;  
      
        ctx.fillStyle = "#00f3ff";  
        ctx.font = fontSize + "px monospace";  
        ctx.fillText(char, x, y);  
      
        if(y > canvas.height && Math.random() > 0.975){  
          drops[i] = 0;  
        }  
        drops[i]++;  
      }  
    }  
      
    setInterval(drawMatrix, 33);  
      
    // WhatsApp Form Handler
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e){  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if(!service || !problem){  
        alert("Please select a service and write your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>
